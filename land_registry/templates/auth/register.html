{% extends 'base.html' %}

{% block title %}Register - GeoLedger{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 py-12">
    <div class="max-w-md w-full">
        <!-- Card Container -->
        <div class="glass-effect rounded-2xl shadow-xl p-8 hover-scale">
            <!-- Logo and Title -->
            <div class="text-center mb-8">
                <div class="mx-auto w-20 h-20 mb-4">
                    <svg class="w-full h-full text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" 
                              d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                    </svg>
                </div>
                <h2 class="text-3xl font-bold text-white">Create Account</h2>
                <p class="mt-2 text-gray-400">Join the decentralized land registry system</p>
            </div>

            <!-- Form -->
            <form method="post" class="mt-8 space-y-6">
                {% csrf_token %}
                
                <!-- Username Field -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300">
                        Username
                    </label>
                    <div class="mt-1">
                        <input id="username" name="username" type="text" required
                               class="appearance-none block w-full px-4 py-3 border border-gray-700 rounded-xl
                                      bg-gray-800 text-white placeholder-gray-400
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      transition duration-150 ease-in-out">
                    </div>
                </div>

                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300">
                        Email Address
                    </label>
                    <div class="mt-1">
                        <input id="email" name="email" type="email" required
                               class="appearance-none block w-full px-4 py-3 border border-gray-700 rounded-xl
                                      bg-gray-800 text-white placeholder-gray-400
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      transition duration-150 ease-in-out">
                    </div>
                </div>

                <!-- First Name Field -->
                <div>
                    <label for="first_name" class="block text-sm font-medium text-gray-300">
                        First Name
                    </label>
                    <div class="mt-1">
                        <input id="first_name" name="first_name" type="text" required
                               class="appearance-none block w-full px-4 py-3 border border-gray-700 rounded-xl
                                      bg-gray-800 text-white placeholder-gray-400
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      transition duration-150 ease-in-out">
                    </div>
                </div>

                <!-- Last Name Field -->
                <div>
                    <label for="last_name" class="block text-sm font-medium text-gray-300">
                        Last Name
                    </label>
                    <div class="mt-1">
                        <input id="last_name" name="last_name" type="text" required
                               class="appearance-none block w-full px-4 py-3 border border-gray-700 rounded-xl
                                      bg-gray-800 text-white placeholder-gray-400
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      transition duration-150 ease-in-out">
                    </div>
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300">
                        Password
                    </label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" required
                               class="appearance-none block w-full px-4 py-3 border border-gray-700 rounded-xl
                                      bg-gray-800 text-white placeholder-gray-400
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      transition duration-150 ease-in-out">
                    </div>
                </div>

                <!-- Role Selection -->
                <div>
                    <label for="role" class="block text-sm font-medium text-gray-300">
                        Role
                    </label>
                    <div class="mt-1">
                        <select id="role" name="role" required
                                class="appearance-none block w-full px-4 py-3 border border-gray-700 rounded-xl
                                       bg-gray-800 text-white placeholder-gray-400
                                       focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                       transition duration-150 ease-in-out">
                            <option value="">Select a role</option>
                            <option value="citizen">Citizen</option>
                            <option value="registrar">Registrar</option>
                            <option value="surveyor">Surveyor</option>
                            <option value="court">Court Authority</option>
                        </select>
                    </div>
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit"
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent
                                   text-sm font-medium rounded-xl text-white gradient-bg hover:opacity-90
                                   focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary
                                   transition duration-150 ease-in-out">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                            <svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                            </svg>
                        </span>
                        Create Account
                    </button>
                </div>
            </form>

            <!-- Links -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-400">
                    Already have an account?
                    <a href="{% url 'land_registry:login' %}" class="font-medium text-primary hover:text-primary-dark">
                        Sign in here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
